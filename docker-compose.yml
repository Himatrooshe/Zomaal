services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-zomaal}
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6380:6379'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - PORT=${PORT:-3000}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-zomaal}
      - JWT_SECRET=${JWT_SECRET:-local-development-jwt-secret-change-before-production}
      - LOGGER_PHONE=${LOGGER_PHONE:-+212600000001}
      - LOGGER_PASSWORD=${LOGGER_PASSWORD:-ZomaalDemo#2026}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_REQUIRED=true
      - SHIPPING_CREDENTIAL_ENCRYPTION_KEY=${SHIPPING_CREDENTIAL_ENCRYPTION_KEY:-}
      - SHOPIFY_ENABLED=${SHOPIFY_ENABLED:-false}
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY:-}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET:-}
      - SHOPIFY_SCOPES=${SHOPIFY_SCOPES:-}
      - SHOPIFY_APP_URL=${SHOPIFY_APP_URL:-}
      - SHOPIFY_REDIRECT_URI=${SHOPIFY_REDIRECT_URI:-}
      - SHOPIFY_API_VERSION=${SHOPIFY_API_VERSION:-2026-07}
      - SHOPIFY_TOKEN_ENCRYPTION_KEY=${SHOPIFY_TOKEN_ENCRYPTION_KEY:-}
      - SHOPIFY_OAUTH_STATE_TTL_SECONDS=${SHOPIFY_OAUTH_STATE_TTL_SECONDS:-600}
      - SHOPIFY_TOKEN_REFRESH_SKEW_SECONDS=${SHOPIFY_TOKEN_REFRESH_SKEW_SECONDS:-300}
      - SHOPIFY_HTTP_TIMEOUT_MS=${SHOPIFY_HTTP_TIMEOUT_MS:-15000}
      - SHOPIFY_AUTH_SUCCESS_REDIRECT_URL=${SHOPIFY_AUTH_SUCCESS_REDIRECT_URL:-}
      - SHOPIFY_AUTH_FAILURE_REDIRECT_URL=${SHOPIFY_AUTH_FAILURE_REDIRECT_URL:-}
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
