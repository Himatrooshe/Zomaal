        RECEIVE:
          type: string
          description: Full name of the parcel recipient.
          example: Youssef El Amrani
          maxLength: 50
        PHONE:
          type: string
          description: >-
            Recipient phone number accepted by ForceLog, including the country
            code when applicable.
          example: '0612345678'
          maxLength: 14
        CITY:
          type: string
          description: >-
            Destination city ID/code or city name as returned by `GET
