  /shipping/ozoneexpress/connection:
    get:
      description: >-
        Requires `Authorization: Bearer <accessToken>`. Returns whether the
        authenticated Zomaal user has stored OzoneExpress credentials. This
        status check does not call OzoneExpress and never returns the customer
        ID or API key.
      operationId: getOzoneExpressConnectionStatus
      parameters: []
      responses:
        '200':
          description: Current user OzoneExpress connection status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OzoneExpressConnectionStatusDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Check OzoneExpress account connection
      tags:
        - Shipping - OzoneExpress
    post:
      description: >-
        Requires `Authorization: Bearer <accessToken>` and `Content-Type:
        application/json`. Validates the customer ID and API key using the
        read-only parcel-info endpoint, then encrypts and stores both values.
        Reconnecting replaces the previous credentials. Credentials are never
        returned.
      operationId: connectOzoneExpressAccount
      parameters: []
      requestBody:
        required: true
        description: >-
          OzoneExpress customer identifier and API key to validate and store for
          the authenticated user.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectOzoneExpressDto'
            examples:
              accountCredentials:
                summary: OzoneExpress account credentials
                value:
                  customerId: '12345'
                  apiKey: your-ozoneexpress-api-key
      responses:
        '201':
          description: Credentials verified and OzoneExpress account connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OzoneExpressConnectionStatusDto'
        '400':
          description: Missing, empty, or unexpected request field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '401':
          description: Invalid Zomaal token or rejected OzoneExpress credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '502':
          description: OzoneExpress returned an invalid or failed response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OzoneExpressConnectionErrorDto'
        '503':
          description: OzoneExpress is unreachable or credential encryption is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Connect or replace the current user's OzoneExpress account
      tags:
        - Shipping - OzoneExpress
    delete:
      description: >-
        Requires `Authorization: Bearer <accessToken>`. Deletes the encrypted
        customer ID and API key stored for the authenticated user. This
        operation is idempotent: disconnecting an already disconnected account
        still succeeds.
      operationId: disconnectOzoneExpressAccount
      parameters: []
      responses:
        '200':
          description: OzoneExpress account disconnected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OzoneExpressConnectionStatusDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Disconnect the current user's OzoneExpress account
      tags:
        - Shipping - OzoneExpress
  /shipping/ozoneexpress/parcels:
    post:
      description: >-
        Requires `Authorization: Bearer <accessToken>` and `Content-Type:
        application/json`. The authenticated user must connect OzoneExpress
        first. Zomaal maps this JSON payload to the provider field names and
        injects the stored credentials server-side.
      operationId: createOzoneExpressParcel
      parameters: []
      requestBody:
        required: true
        description: Recipient, cash-on-delivery, handling, and fulfillment details.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OzoneExpressParcelDto'
            examples:
              pickupParcel:
                summary: Pickup/non-stock cash-on-delivery parcel
                value:
                  trackingNumber: ZOM-ORDER-1001
                  receiver: Sara El Amrani
                  phone: '0612345678'
                  city: '1'
                  address: 123 Rue Al Massira, Maarif, Casablanca
                  price: 250
                  stock: 0
                  note: Call the recipient before delivery
                  nature: One pair of running shoes
                  open: 2
                  fragile: 0
                  replace: 0
              stockParcel:
                summary: OzoneExpress stock-fulfilled parcel
                value:
                  receiver: Sara El Amrani
                  phone: '0612345678'
                  city: '1'
                  address: 123 Rue Al Massira, Maarif, Casablanca
                  price: 250
                  stock: 1
                  open: 2
                  fragile: 0
                  replace: 0
                  products:
                    - ref: SKU-SHOE-BLK-42
                      qnty: 2
      responses:
        '201':
          description: >-
            Parcel accepted. Zomaal returns the OzoneExpress JSON response
            unchanged, so the provider may add fields to this envelope.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                example:
                  CHECK_API:
                    RESULT: SUCCESS
                    MESSAGE: Valide API Key
                  ADD-PARCEL:
                    RESULT: SUCCESS
                    MESSAGE: Parcel added successfully
                    TRACKING-NUMBER: OZ123456789MA
        '400':
          description: >-
            A required parcel field is missing/invalid or an unexpected field
            was sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '409':
          description: The current user has not connected an OzoneExpress account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '502':
          description: >-
            OzoneExpress rejected the request or returned a malformed/failed
            response. When available, the provider body is included in
            `ozoneexpress`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OzoneExpressConnectionErrorDto'
        '503':
          description: >-
            OzoneExpress is unreachable or the stored credentials cannot be
            decrypted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Add an OzoneExpress parcel
      tags:
        - Shipping - OzoneExpress
  /shipping/ozoneexpress/parcels/{trackingNumber}:
    get:
      description: >-
