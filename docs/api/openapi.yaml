        PRODUCT_NAME:
          type: string
          description: Display name of the product in ForceLog stock.
          example: Classic cotton T-shirt
        QUANTITY:
          type: number
          description: >-
            Initial quantity for a product without variants. Do not duplicate
            variant quantities here.
          example: 50
          minimum: 0
        BARCODE:
          type: string
          description: Unique merchant barcode or SKU for a product without variants.
          example: TSHIRT-CLASSIC
        CATEGORY_ID:
          type: number
          description: ForceLog stock category identifier.
          example: 12
          minimum: 1
        VARIANTS:
          description: >-
            Optional product variants. Each variant carries its own quantity and
            barcode.
          example:
            - NAME: Black / Medium
              QUANTITY: 20
              BARCODE: TSHIRT-BLK-M
            - NAME: Black / Large
              QUANTITY: 15
              BARCODE: TSHIRT-BLK-L
          type: array
          items:
            $ref: '#/components/schemas/ForceLogProductVariantDto'
      required:
        - PRODUCT_NAME
    ForceLogReturnRequestDto:
      type: object
      properties:
        PARCELS:
          description: >-
            One or more ForceLog parcel codes selected from the eligible-return
            endpoint.
          example:
            - FL123456789MA
            - FL123456790MA
          minItems: 1
          type: array
          items:
            type: string
        PHONE:
          type: string
          description: Phone number ForceLog should call to arrange collection.
          example: '0612345678'
        QUARTER:
          type: string
          description: Pickup neighborhood, district, or quarter.
          example: Maarif
          minLength: 5
        CITY:
          type: string
          description: Pickup city ID/code obtained from `GET /shipping/forcelog/cities`.
          example: Casablanca
        NOTE:
          type: string
          description: Additional collection instructions for ForceLog.
          example: Call 30 minutes before arrival
      required:
        - PARCELS
        - PHONE
        - QUARTER
        - CITY
    OzoneExpressConnectionStatusDto:
      type: object
      properties:
        connected:
          type: boolean
          description: >-
            Whether the authenticated Zomaal user currently has stored
            OzoneExpress credentials.
          example: true
        provider:
          type: string
          description: Stable provider identifier.
          enum:
            - ozoneexpress.ma
          example: ozoneexpress.ma
        connectedAt:
          type: string
          description: >-
            UTC time at which the current credentials were connected or
            replaced. Null while disconnected.
          example: '2026-07-16T10:30:00.000Z'
          nullable: true
          format: date-time
        message:
          type: string
          description: Human-readable status summary.
          example: OzoneExpress account is connected
      required:
        - connected
        - provider
        - connectedAt
        - message
    ConnectOzoneExpressDto:
      type: object
      properties:
        customerId:
          type: string
          description: >-
            Customer identifier from the OzoneExpress account/API page. It is
            treated as a string so leading zeros are preserved.
          example: '12345'
        apiKey:
          type: string
          description: >-
            API key from the OzoneExpress account/API page. Zomaal validates it,
            encrypts it at rest, and never returns it.
          example: your-ozoneexpress-api-key
          format: password
          writeOnly: true
      required:
        - customerId
        - apiKey
    OzoneExpressConnectionErrorDto:
      type: object
      properties:
        message:
          oneOf:
            - type: string
              example: OzoneExpress request failed with status 401
            - type: array
              items:
                type: string
              example:
                - apiKey should not be empty
        error:
          type: string
          description: >-
            Standard NestJS error label. Omitted when the raw provider error
            object is attached.
          example: Bad Gateway
        statusCode:
          type: number
          description: >-
            HTTP status code. Omitted when the raw provider error object is
            attached.
          example: 502
        ozoneexpress:
          type: object
          description: >-
            Provider error body when OzoneExpress returned structured JSON. This
            field is omitted when the response could not be parsed.
          additionalProperties: true
          example:
            CHECK_API:
              RESULT: ERROR
              MESSAGE: Please verify your API Key
      required:
        - message
    OzoneExpressProductDto:
      type: object
      properties:
        ref:
          type: string
          description: >-
            Product reference exactly as registered in the OzoneExpress stock
            catalog.
          example: SKU-SHOE-BLK-42
        qnty:
          type: number
          description: Quantity of this stock product included in the parcel.
          example: 2
      required:
        - ref
        - qnty
    OzoneExpressParcelDto:
      type: object
      properties:
        trackingNumber:
          type: string
          description: >-
            Merchant-supplied tracking/reference number. Omit it to let
            OzoneExpress assign a tracking number when supported by the
            connected account.
          example: ZOM-ORDER-1001
        receiver:
          type: string
          description: Full name of the parcel recipient.
          example: Sara El Amrani
        phone:
          type: string
          description: >-
            Recipient phone number as accepted by OzoneExpress. A Moroccan
            national-format number is shown in the example.
          example: '0612345678'
        city:
          type: string
          description: >-
            OzoneExpress city identifier. Resolve it with GET
            /shipping/ozoneexpress/cities before creating a parcel.
          example: '1'
        address:
          type: string
          description: Complete street address used for final delivery.
          example: 123 Rue Al Massira, Maarif, Casablanca
        price:
          type: number
          description: >-
            Cash-on-delivery amount in Moroccan dirhams (MAD). Use 0 for a
            prepaid parcel.
          example: 250
          minimum: 0
        stock:
          type: number
          description: >-
            Fulfillment mode: 1 uses products held in OzoneExpress stock; 0
            requests pickup/non-stock handling.
          enum:
            - 0
            - 1
          example: 0
        note:
          type: string
          description: Delivery instructions forwarded to OzoneExpress.
          example: Call the recipient before delivery
        nature:
          type: string
          description: Description of the parcel contents.
          example: One pair of running shoes
        open:
          type: number
          description: >-
            Package inspection policy: 1 allows the recipient to open the
            package; 2 does not.
          enum:
            - 1
            - 2
          example: 2
        fragile:
          type: number
          description: 'Fragile handling flag: 1 means fragile; 0 means standard.'
          enum:
            - 0
            - 1
          example: 0
        replace:
          type: number
          description: >-
            Replacement/exchange flag: 1 identifies a replacement parcel; 0 is a
            normal shipment.
          enum:
            - 0
            - 1
          example: 0
        products:
          description: >-
            Stock product lines. Supply this list when stock is 1; omit it for
            pickup/non-stock parcels.
          example:
            - ref: SKU-SHOE-BLK-42
              qnty: 2
          type: array
          items:
            $ref: '#/components/schemas/OzoneExpressProductDto'
      required:
        - receiver
        - phone
        - city
        - address
        - price
        - stock
    OzoneExpressTrackingDto:
      type: object
      properties:
        trackingNumber:
          description: >-
            One tracking number or an array of tracking numbers. Use an array to
            retrieve multiple tracking histories in one request.
          oneOf:
            - type: string
              example: OZ123456789MA
            - type: array
              items:
                type: string
              example:
                - OZ123456789MA
                - OZ987654321MA
      required:
        - trackingNumber
    OzoneExpressDeliveryNoteParcelsDto:
      type: object
      properties:
        ref:
          type: string
          description: >-
            Delivery-note reference returned by POST
            /shipping/ozoneexpress/delivery-notes.
          example: DN-2026-000123
        codes:
          description: OzoneExpress parcel tracking codes to attach to the delivery note.
          minItems: 1
          example:
            - OZ123456789MA
            - OZ987654321MA
          type: array
          items:
            type: string
      required:
        - ref
        - codes
    OzoneExpressDeliveryNoteRefDto:
      type: object
      properties:
        ref:
          type: string
          description: >-
            Delivery-note reference returned by POST
            /shipping/ozoneexpress/delivery-notes.
          example: DN-2026-000123
      required:
        - ref
    OzoneExpressDeliveryNotePdfLinksDto:
      type: object
      properties:
        ref:
          type: string
          description: Delivery-note reference used to build the links.
          example: DN-2026-000123
        pdfStandard:
          type: string
          description: Standard delivery-note PDF URL.
          example: >-
            https://client.ozoneexpress.ma/pdf-delivery-note?dn-ref=DN-2026-000123
          format: uri
        labelsA4:
          type: string
          description: A4 parcel-label PDF URL.
          example: >-
            https://client.ozoneexpress.ma/pdf-delivery-note-tickets?dn-ref=DN-2026-000123
          format: uri
        labels10x10:
          type: string
          description: 10 x 10 cm parcel-label PDF URL.
          example: >-
            https://client.ozoneexpress.ma/pdf-delivery-note-tickets-4-4?dn-ref=DN-2026-000123
          format: uri
      required:
        - ref
        - pdfStandard
        - labelsA4
        - labels10x10
    ShippingAuthFieldDto:
      type: object
      properties:
        key:
          type: string
          example: apiKey
        label:
          type: string
          example: API key
        placeholder:
          type: string
          example: Enter your API key
        inputType:
          type: string
          enum:
            - text
            - secure_text
          example: secure_text
        required:
          type: boolean
          example: true
        sensitive:
          type: boolean
          description: >-
            When true, the frontend should mask the value and must not persist
            it in logs or analytics.
          example: true
      required:
        - key
        - label
        - placeholder
        - inputType
        - required
        - sensitive
    ShippingCompanyDto:
      type: object
      properties:
        code:
          type: string
          enum:
            - sendit
            - quicklivraison
            - forcelog
            - ozoneexpress
          example: forcelog
        name:
          type: string
          example: ForceLog
        description:
          type: string
          example: Moroccan delivery and COD service
        logoUrl:
          type: string
          nullable: true
          example: null
        status:
          type: string
          enum:
            - available
          example: available
        connected:
          type: boolean
          example: false
        connectedAt:
          type: string
          nullable: true
          format: date-time
          example: null
        instructions:
          type: string
          example: Enter the API key from your ForceLog account.
        authFields:
          type: array
          items:
            $ref: '#/components/schemas/ShippingAuthFieldDto'
      required:
        - code
        - name
        - description
        - logoUrl
        - status
        - connected
        - connectedAt
        - instructions
        - authFields
    ShippingCountryDto:
      type: object
      properties:
        code:
          type: string
          example: MA
        name:
          type: string
          example: Morocco
        status:
          type: string
          enum:
            - available
            - coming_soon
          example: available
        availableCompanyCount:
          type: number
          example: 4
        companies:
          type: array
          items:
            $ref: '#/components/schemas/ShippingCompanyDto'
      required:
        - code
        - name
        - status
        - availableCompanyCount
        - companies
    ShippingIntegrationsResponseDto:
      type: object
      properties:
        countries:
          type: array
          items:
            $ref: '#/components/schemas/ShippingCountryDto'
      required:
        - countries
    ShippingIntegrationConnectionResponseDto:
      type: object
      properties:
        companyCode:
          type: string
          enum:
            - sendit
            - quicklivraison
            - forcelog
            - ozoneexpress
          example: forcelog
        connected:
          type: boolean
          example: true
        connectedAt:
          type: string
          nullable: true
          format: date-time
          example: '2026-07-16T10:30:00.000Z'
        message:
          type: string
          example: ForceLog account is connected
      required:
        - companyCode
        - connected
        - connectedAt
        - message
