                $ref: '#/components/schemas/ApiErrorDto'
        '502':
          description: QuickLivraison returned a malformed or failed response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickLivraisonConnectionErrorDto'
        '503':
          description: >-
            QuickLivraison is unreachable or the stored credential cannot be
