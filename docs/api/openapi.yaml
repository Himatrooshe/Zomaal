openapi: 3.0.3
info:
  title: Zomaal API
  version: 1.0.0
  description: |
    Verified API surface for Zomaal authentication, profile/store onboarding,
    and per-user Sendit, QuickLivraison, ForceLog, and OzoneExpress account connections.

    Protected endpoints require `Authorization: Bearer <accessToken>`.
    The access token expires after 15 minutes. Provider credentials are
    validated before being encrypted and stored, and are never returned.

    Runtime endpoints that have not completed integration testing are
    intentionally omitted from this specification.
servers:
  - url: http://localhost:{port}
    description: Local development
    variables:
      port:
        default: '3001'
        description: Value configured by the backend PORT environment variable.
tags:
  - name: Auth
    description: Phone OTP authentication and token rotation.
  - name: Users
    description: Authenticated user profile.
  - name: Stores
    description: Store onboarding and profile management.
  - name: Shipping - Sendit
    description: Per-user Sendit account connection management.
  - name: Shipping - QuickLivraison
    description: Per-user QuickLivraison account connection management.
  - name: Shipping - ForceLog
    description: Per-user ForceLog account connection management.
  - name: Shipping - OzoneExpress
    description: Per-user OzoneExpress account connection management.
paths:
  /auth/send-otp:
    post:
      tags: [Auth]
      summary: Send an OTP to a phone number
      description: In development OTP mode no message is sent; use the configured DEV_OTP_CODE.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendOtpRequest'
            example:
              phone: '+212612345678'
              channel: sms
      responses:
        '200':
          description: OTP request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: More than 3 OTP requests in 10 minutes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: OTP provider is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP and log in or register
      description: Creates a user on first successful verification and returns a 15-minute access token and 7-day refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
            example:
              phone: '+212612345678'
              otp: '123456'
      responses:
        '200':
          description: Authentication succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          description: Invalid input or invalid/expired OTP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: More than 5 verification attempts in 10 minutes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue a new token pair
      description: The supplied refresh token is single-use after rotation. Store the newly returned refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Refresh token is invalid, expired, revoked, or not a refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      description: Returns the user identified by the access token, including their store when one exists. Refresh-token hashes are never returned.
      responses:
        '200':
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: User no longer exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stores:
    post:
      tags: [Stores]
      summary: Create the current user's store
      description: Creates one store for the authenticated user and marks onboarding as complete.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoreRequest'
      responses:
        '201':
          description: Store created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: The authenticated user already has a store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stores/me:
    get:
      tags: [Stores]
      summary: Get the current user's store
      responses:
        '200':
          description: Current user's store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: The authenticated user has not created a store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Stores]
      summary: Update the current user's store
      description: All request fields are optional; only supplied fields are changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStoreRequest'
      responses:
        '200':
          description: Updated store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: The authenticated user has not created a store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /shipping/sendit/connection:
    get:
      tags: [Shipping - Sendit]
      summary: Check Sendit account connection
      description: Reads connection status from Zomaal without calling Sendit.
      responses:
        '200':
          description: Current user's Sendit connection status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditConnectionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Shipping - Sendit]
      summary: Connect or replace the current user's Sendit account
      description: Validates the credentials with Sendit, then encrypts and stores them for the authenticated user. Credentials are never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SenditConnectionRequest'
      responses:
        '201':
          description: Sendit account connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditConnectionStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Zomaal token is invalid or Sendit rejected the credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Sendit returned an invalid or failed response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Credential encryption is not configured correctly.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Shipping - Sendit]
      summary: Disconnect the current user's Sendit account
      description: Deletes stored credentials and the cached provider token. This operation is idempotent.
      responses:
        '200':
          description: Sendit account disconnected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditConnectionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /shipping/quicklivraison/connection:
    get:
      tags: [Shipping - QuickLivraison]
      summary: Check QuickLivraison account connection
      description: Reads connection status from Zomaal without calling QuickLivraison.
      responses:
        '200':
          description: Current user's QuickLivraison connection status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickLivraisonConnectionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Shipping - QuickLivraison]
      summary: Connect or replace the current user's QuickLivraison account
      description: Validates a primary or subuser API key through QuickLivraison's product endpoint, then encrypts and stores it. The key is never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuickLivraisonConnectionRequest'
            example:
              apiKey: sub_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      responses:
        '201':
          description: QuickLivraison account connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickLivraisonConnectionStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          description: QuickLivraison rejected the API key or returned an invalid response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderErrorResponse'
        '503':
          description: QuickLivraison is unreachable or credential encryption is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Shipping - QuickLivraison]
      summary: Disconnect the current user's QuickLivraison account
      description: Deletes the encrypted API key. This operation is idempotent.
      responses:
        '200':
          description: QuickLivraison account disconnected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickLivraisonConnectionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /shipping/forcelog/connection:
    get:
      tags: [Shipping - ForceLog]
      summary: Check ForceLog account connection
      description: Reads connection status from Zomaal without calling ForceLog.
      responses:
        '200':
          description: Current user's ForceLog connection status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForceLogConnectionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Shipping - ForceLog]
      summary: Connect or replace the current user's ForceLog account
      description: Validates the API key against ForceLog's authenticated cities endpoint, then encrypts and stores it. The key is never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForceLogConnectionRequest'
            example:
              apiKey: your-forcelog-api-key
      responses:
        '201':
          description: ForceLog account connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForceLogConnectionStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          description: ForceLog rejected the API key or returned an invalid response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: ForceLog is unreachable or credential encryption is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Shipping - ForceLog]
      summary: Disconnect the current user's ForceLog account
      description: Deletes the encrypted API key. This operation is idempotent.
      responses:
        '200':
          description: ForceLog account disconnected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForceLogConnectionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /shipping/ozoneexpress/connection:
    get:
      tags: [Shipping - OzoneExpress]
      summary: Check OzoneExpress account connection
      description: Reads connection status from Zomaal without calling OzoneExpress.
      responses:
        '200':
          description: Current user's OzoneExpress connection status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OzoneExpressConnectionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Shipping - OzoneExpress]
      summary: Connect or replace the current user's OzoneExpress account
      description: Validates the customer ID and API key using the read-only parcel-info endpoint and its CHECK_API result, then encrypts and stores both values. Credentials are never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OzoneExpressConnectionRequest'
            example:
              customerId: '12345'
              apiKey: your-ozoneexpress-api-key
      responses:
        '201':
          description: OzoneExpress account connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OzoneExpressConnectionStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Zomaal token is invalid or OzoneExpress rejected the credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: OzoneExpress returned an invalid or failed response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: OzoneExpress is unreachable or credential encryption is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Shipping - OzoneExpress]
      summary: Disconnect the current user's OzoneExpress account
      description: Deletes the encrypted customer ID and API key. This operation is idempotent.
      responses:
        '200':
          description: OzoneExpress account disconnected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OzoneExpressConnectionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token returned by POST /auth/verify-otp or POST /auth/refresh.
  responses:
    BadRequest:
      description: Invalid, missing, empty, or unexpected request field.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing, invalid, expired, or non-access bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [message, error, statusCode]
      properties:
        message:
          oneOf:
            - type: string
              example: Invalid or expired OTP
            - type: array
              items:
                type: string
              example: [phone must be a valid phone number]
        error:
          type: string
          example: Bad Request
        statusCode:
          type: integer
          example: 400
    ProviderErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            quicklivraison:
              type: object
              additionalProperties: true
              example:
                error: Invalid API key
                error_code: 401
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: OTP sent successfully
    SendOtpRequest:
      type: object
      required: [phone, channel]
      additionalProperties: false
      properties:
        phone:
          type: string
          description: International E.164 phone number.
          example: '+212612345678'
        channel:
          type: string
          enum: [sms, whatsapp]
          example: sms
    VerifyOtpRequest:
      type: object
      required: [phone, otp]
      additionalProperties: false
      properties:
        phone:
          type: string
          description: Same phone number used to request the OTP.
          example: '+212612345678'
        otp:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^.{6}$'
          example: '123456'
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      additionalProperties: false
      properties:
        refreshToken:
          type: string
          description: Refresh token returned by verify-otp or the previous refresh call.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    TokenPair:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
          description: Bearer token that expires after 15 minutes.
        refreshToken:
          type: string
          description: Refresh token that expires after 7 days.
    AuthTokensResponse:
      allOf:
        - $ref: '#/components/schemas/TokenPair'
        - type: object
          required: [isProfileCompleted]
          properties:
            isProfileCompleted:
              type: boolean
              example: false
    Store:
      type: object
      required:
        [
          id,
          ownerName,
          businessName,
          address,
          city,
          country,
          logoUrl,
          isActive,
          createdAt,
          updatedAt,
          userId,
        ]
      properties:
        id:
          type: string
          format: uuid
        ownerName:
          type: string
          example: Ahmed Alaoui
        businessName:
          type: string
          example: Atlas Market
        address:
          type: string
          example: 123 Rue Hassan II
        city:
          type: string
          example: Casablanca
        country:
          type: string
          example: Morocco
        logoUrl:
          type: string
          format: uri
          nullable: true
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        userId:
          type: string
          format: uuid
    CreateStoreRequest:
      type: object
      required: [ownerName, businessName, address, city, country]
      additionalProperties: false
      properties:
        ownerName:
          type: string
          example: Ahmed Alaoui
        businessName:
          type: string
          example: Atlas Market
        address:
          type: string
          example: 123 Rue Hassan II
        city:
          type: string
          example: Casablanca
        country:
          type: string
          example: Morocco
        logoUrl:
          type: string
          format: uri
          example: https://example.com/logo.png
    UpdateStoreRequest:
      type: object
      additionalProperties: false
      properties:
        ownerName:
          type: string
        businessName:
          type: string
        address:
          type: string
        city:
          type: string
        country:
          type: string
        logoUrl:
          type: string
          format: uri
    UserProfile:
      type: object
      required:
        [
          id,
          phone,
          isPhoneVerified,
          onboardingComplete,
          createdAt,
          updatedAt,
          store,
        ]
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: '+212612345678'
        isPhoneVerified:
          type: boolean
          example: true
        onboardingComplete:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        store:
          allOf:
            - $ref: '#/components/schemas/Store'
          nullable: true
    SenditConnectionRequest:
      type: object
      required: [public_key, secret_key]
      additionalProperties: false
      properties:
        public_key:
          type: string
          description: Public API key from the customer's Sendit account.
          example: sendit-public-key
        secret_key:
          type: string
          format: password
          writeOnly: true
          description: Secret API key from the customer's Sendit account.
          example: sendit-secret-key
    SenditConnectionStatus:
      type: object
      required: [connected, provider, accountName, connectedAt, message]
      properties:
        connected:
          type: boolean
          example: true
        provider:
          type: string
          enum: [sendit.ma]
        accountName:
          type: string
          nullable: true
          example: Example Store
        connectedAt:
          type: string
          format: date-time
          nullable: true
        message:
          type: string
          example: Sendit account is connected
    QuickLivraisonConnectionRequest:
      type: object
      required: [apiKey]
      additionalProperties: false
      properties:
        apiKey:
          type: string
          format: password
          writeOnly: true
          description: Primary or subuser API key generated in the QuickLivraison customer dashboard.
          example: sub_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    QuickLivraisonConnectionStatus:
      type: object
      required: [connected, provider, keyType, connectedAt, message]
      properties:
        connected:
          type: boolean
          example: true
        provider:
          type: string
          enum: [quicklivraison.ma]
        keyType:
          type: string
          enum: [primary, subuser]
          nullable: true
          example: subuser
        connectedAt:
          type: string
          format: date-time
          nullable: true
        message:
          type: string
          example: QuickLivraison account is connected
    ForceLogConnectionRequest:
      type: object
      required: [apiKey]
      additionalProperties: false
      properties:
        apiKey:
          type: string
          format: password
          writeOnly: true
          description: Customer API key obtained from the ForceLog account.
          example: your-forcelog-api-key
    ForceLogConnectionStatus:
      type: object
      required: [connected, provider, connectedAt, message]
      properties:
        connected:
          type: boolean
          example: true
        provider:
          type: string
          enum: [forcelog.ma]
        connectedAt:
          type: string
          format: date-time
          nullable: true
        message:
          type: string
          example: ForceLog account is connected
    OzoneExpressConnectionRequest:
      type: object
      required: [customerId, apiKey]
      additionalProperties: false
      properties:
        customerId:
          type: string
          description: Customer identifier from the OzoneExpress account/API page.
          example: '12345'
        apiKey:
          type: string
          format: password
          writeOnly: true
          description: API key from the OzoneExpress account/API page.
          example: your-ozoneexpress-api-key
    OzoneExpressConnectionStatus:
      type: object
      required: [connected, provider, connectedAt, message]
      properties:
        connected:
          type: boolean
          example: true
        provider:
          type: string
          enum: [ozoneexpress.ma]
        connectedAt:
          type: string
          format: date-time
          nullable: true
        message:
          type: string
          example: OzoneExpress account is connected
security:
  - bearerAuth: []
