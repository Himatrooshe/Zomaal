openapi: 3.0.3
info:
  title: Zomaal API
  version: 1.0.0
  description: |
    Verified API surface for Zomaal authentication, profile/store onboarding,
    and per-user Sendit, QuickLivraison, ForceLog, and OzoneExpress account connections.

    Protected endpoints require `Authorization: Bearer <accessToken>`.
    The access token expires after 15 minutes. Provider credentials are
    validated before being encrypted and stored, and are never returned.

    Runtime endpoints that have not completed integration testing are
    intentionally omitted from this specification.
servers:
  - url: http://localhost:{port}
    description: Local development
    variables:
      port:
        default: '3001'
        description: Value configured by the backend PORT environment variable.
tags:
  - name: Auth
    description: Phone OTP authentication and token rotation.
  - name: Users
    description: Authenticated user profile.
  - name: Stores
    description: Store onboarding and profile management.
  - name: Shipping Integrations
    description: Frontend catalog and generic shipping-company connection management.
paths:
  /auth/send-otp:
    post:
      tags: [Auth]
      summary: Send an OTP to a phone number
      description: In development OTP mode no message is sent; use the configured DEV_OTP_CODE.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendOtpRequest'
            example:
              phone: '+212612345678'
              channel: sms
      responses:
        '200':
          description: OTP request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: More than 3 OTP requests in 10 minutes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: OTP provider is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP and log in or register
      description: Creates a user on first successful verification and returns a 15-minute access token and 7-day refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
            example:
              phone: '+212612345678'
              otp: '123456'
      responses:
        '200':
          description: Authentication succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          description: Invalid input or invalid/expired OTP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: More than 5 verification attempts in 10 minutes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue a new token pair
      description: The supplied refresh token is single-use after rotation. Store the newly returned refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Refresh token is invalid, expired, revoked, or not a refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      description: Returns the user identified by the access token, including their store when one exists. Refresh-token hashes are never returned.
      responses:
        '200':
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: User no longer exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stores:
    post:
      tags: [Stores]
      summary: Create the current user's store
      description: Creates one store for the authenticated user and marks onboarding as complete.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoreRequest'
      responses:
        '201':
          description: Store created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: The authenticated user already has a store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stores/me:
    get:
      tags: [Stores]
      summary: Get the current user's store
      responses:
        '200':
          description: Current user's store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: The authenticated user has not created a store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Stores]
      summary: Update the current user's store
      description: All request fields are optional; only supplied fields are changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStoreRequest'
      responses:
        '200':
          description: Updated store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: The authenticated user has not created a store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /shipping/integrations:
    get:
      tags: [Shipping Integrations]
      summary: Load the complete shipping integration catalog
      description: |
        Frontend bootstrap endpoint. Returns countries, available companies,
        the current user's connection state, instructions, and the exact fields
        needed to build each credentials form.

        No credential values are returned. Load this endpoint once, then handle
        country navigation, company search, and form rendering locally.
      responses:
        '200':
          description: Complete frontend shipping catalog.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingIntegrationsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /shipping/integrations/{companyCode}/connection:
    parameters:
      - name: companyCode
        in: path
        required: true
        description: Stable shipping company identifier returned by the catalog.
        schema:
          type: string
          enum: [sendit, quicklivraison, forcelog, ozoneexpress]
        example: forcelog
    post:
      tags: [Shipping Integrations]
      summary: Connect or replace a shipping company account
      description: |
        Submit only the credential fields declared in authFields for the
        selected company. Values with inputType=secure_text must be masked by
        the frontend and excluded from logs and analytics.

        In Swagger UI, the companyCode path dropdown and request example
        dropdown are independent. Select the matching named request example.

        Credentials are validated with the selected provider before encrypted
        storage. Credential values are never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShippingIntegrationConnectionRequest'
            examples:
              sendit:
                summary: Sendit
                value:
                  credentials:
                    public_key: sendit-public-key
                    secret_key: sendit-secret-key
              quicklivraison:
                summary: QuickLivraison
                value:
                  credentials:
                    apiKey: sub_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
              forcelog:
                summary: ForceLog
                value:
                  credentials:
                    apiKey: your-forcelog-api-key
              ozoneexpress:
                summary: OzoneExpress
                value:
                  credentials:
                    customerId: '12345'
                    apiKey: your-ozoneexpress-api-key
      responses:
        '201':
          description: Provider credentials verified and connection saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingIntegrationConnectionResponse'
        '400':
          description: Missing, empty, unexpected, or provider-inappropriate credential field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Zomaal token is invalid or the selected provider rejected the credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown or unsupported shipping company code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: The selected provider returned an invalid or failed response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: The selected provider is unreachable or credential encryption is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Shipping Integrations]
      summary: Disconnect a shipping company account
      description: Deletes the authenticated user's encrypted credentials for the selected company. This operation is idempotent.
      responses:
        '200':
          description: Shipping company account disconnected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingIntegrationConnectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown or unsupported shipping company code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token returned by POST /auth/verify-otp or POST /auth/refresh.
  responses:
    BadRequest:
      description: Invalid, missing, empty, or unexpected request field.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing, invalid, expired, or non-access bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [message, error, statusCode]
      properties:
        message:
          oneOf:
            - type: string
              example: Invalid or expired OTP
            - type: array
              items:
                type: string
              example: [phone must be a valid phone number]
        error:
          type: string
          example: Bad Request
        statusCode:
          type: integer
          example: 400
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: OTP sent successfully
    SendOtpRequest:
      type: object
      required: [phone, channel]
      additionalProperties: false
      properties:
        phone:
          type: string
          description: International E.164 phone number.
          example: '+212612345678'
        channel:
          type: string
          enum: [sms, whatsapp]
          example: sms
    VerifyOtpRequest:
      type: object
      required: [phone, otp]
      additionalProperties: false
      properties:
        phone:
          type: string
          description: Same phone number used to request the OTP.
          example: '+212612345678'
        otp:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^.{6}$'
          example: '123456'
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      additionalProperties: false
      properties:
        refreshToken:
          type: string
          description: Refresh token returned by verify-otp or the previous refresh call.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    TokenPair:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
          description: Bearer token that expires after 15 minutes.
        refreshToken:
          type: string
          description: Refresh token that expires after 7 days.
    AuthTokensResponse:
      allOf:
        - $ref: '#/components/schemas/TokenPair'
        - type: object
          required: [isProfileCompleted]
          properties:
            isProfileCompleted:
              type: boolean
              example: false
    Store:
      type: object
      required:
        [
          id,
          ownerName,
          businessName,
          address,
          city,
          country,
          logoUrl,
          isActive,
          createdAt,
          updatedAt,
          userId,
        ]
      properties:
        id:
          type: string
          format: uuid
        ownerName:
          type: string
          example: Ahmed Alaoui
        businessName:
          type: string
          example: Atlas Market
        address:
          type: string
          example: 123 Rue Hassan II
        city:
          type: string
          example: Casablanca
        country:
          type: string
          example: Morocco
        logoUrl:
          type: string
          format: uri
          nullable: true
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        userId:
          type: string
          format: uuid
    CreateStoreRequest:
      type: object
      required: [ownerName, businessName, address, city, country]
      additionalProperties: false
      properties:
        ownerName:
          type: string
          example: Ahmed Alaoui
        businessName:
          type: string
          example: Atlas Market
        address:
          type: string
          example: 123 Rue Hassan II
        city:
          type: string
          example: Casablanca
        country:
          type: string
          example: Morocco
        logoUrl:
          type: string
          format: uri
          example: https://example.com/logo.png
    UpdateStoreRequest:
      type: object
      additionalProperties: false
      properties:
        ownerName:
          type: string
        businessName:
          type: string
        address:
          type: string
        city:
          type: string
        country:
          type: string
        logoUrl:
          type: string
          format: uri
    UserProfile:
      type: object
      required:
        [
          id,
          phone,
          isPhoneVerified,
          onboardingComplete,
          createdAt,
          updatedAt,
          store,
        ]
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: '+212612345678'
        isPhoneVerified:
          type: boolean
          example: true
        onboardingComplete:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        store:
          allOf:
            - $ref: '#/components/schemas/Store'
          nullable: true
    ShippingAuthField:
      type: object
      required: [key, label, placeholder, inputType, required, sensitive]
      properties:
        key:
          type: string
          example: apiKey
        label:
          type: string
          example: API key
        placeholder:
          type: string
          example: Enter your API key
        inputType:
          type: string
          enum: [text, secure_text]
          description: Frontend rendering hint. secure_text means the value should be masked because it is sensitive; it is not a separate credential kind.
          example: secure_text
        required:
          type: boolean
          example: true
        sensitive:
          type: boolean
          description: Sensitive values must be excluded from logs, analytics, and local plaintext persistence.
          example: true
    ShippingCompany:
      type: object
      required:
        [
          code,
          name,
          description,
          logoUrl,
          status,
          connected,
          connectedAt,
          instructions,
          authFields,
        ]
      properties:
        code:
          type: string
          enum: [sendit, quicklivraison, forcelog, ozoneexpress]
          example: forcelog
        name:
          type: string
          example: ForceLog
        description:
          type: string
          example: Moroccan delivery and COD service
        logoUrl:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          enum: [available]
        connected:
          type: boolean
          example: false
        connectedAt:
          type: string
          format: date-time
          nullable: true
        instructions:
          type: string
          example: Enter the API key from your ForceLog account.
        authFields:
          type: array
          items:
            $ref: '#/components/schemas/ShippingAuthField'
    ShippingCountry:
      type: object
      required: [code, name, status, availableCompanyCount, companies]
      properties:
        code:
          type: string
          example: MA
        name:
          type: string
          example: Morocco
        status:
          type: string
          enum: [available, coming_soon]
        availableCompanyCount:
          type: integer
          example: 4
        companies:
          type: array
          items:
            $ref: '#/components/schemas/ShippingCompany'
    ShippingIntegrationsResponse:
      type: object
      required: [countries]
      properties:
        countries:
          type: array
          items:
            $ref: '#/components/schemas/ShippingCountry'
    SenditIntegrationConnectionRequest:
      type: object
      required: [credentials]
      additionalProperties: false
      properties:
        credentials:
          type: object
          required: [public_key, secret_key]
          additionalProperties: false
          properties:
            public_key:
              type: string
              example: sendit-public-key
            secret_key:
              type: string
              writeOnly: true
              example: sendit-secret-key
    ApiKeyIntegrationConnectionRequest:
      type: object
      required: [credentials]
      additionalProperties: false
      properties:
        credentials:
          type: object
          required: [apiKey]
          additionalProperties: false
          properties:
            apiKey:
              type: string
              writeOnly: true
              example: your-provider-api-key
    OzoneExpressIntegrationConnectionRequest:
      type: object
      required: [credentials]
      additionalProperties: false
      properties:
        credentials:
          type: object
          required: [customerId, apiKey]
          additionalProperties: false
          properties:
            customerId:
              type: string
              example: '12345'
            apiKey:
              type: string
              writeOnly: true
              example: your-ozoneexpress-api-key
    ShippingIntegrationConnectionRequest:
      oneOf:
        - $ref: '#/components/schemas/SenditIntegrationConnectionRequest'
        - $ref: '#/components/schemas/ApiKeyIntegrationConnectionRequest'
        - $ref: '#/components/schemas/OzoneExpressIntegrationConnectionRequest'
      description: Use only the credentials schema required by the company selected in companyCode.
    ShippingIntegrationConnectionResponse:
      type: object
      required: [companyCode, connected, connectedAt, message]
      properties:
        companyCode:
          type: string
          enum: [sendit, quicklivraison, forcelog, ozoneexpress]
          example: forcelog
        connected:
          type: boolean
          example: true
        connectedAt:
          type: string
          format: date-time
          nullable: true
        message:
          type: string
          example: ForceLog account is connected
security:
  - bearerAuth: []
