openapi: 3.0.0
paths:
  /auth/login:
    post:
      description: >-
        Returns the same 15-minute access token and 7-day refresh token pair as
        OTP verification.
      operationId: Auth_login
      parameters: []
      requestBody:
        required: true
        description: Logger phone number and password.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
            examples:
              logger:
                summary: Configured logger user
                value:
                  phone: '+212600000001'
                  password: zomaal01@
      responses:
        '200':
          description: Authentication succeeded.
          headers:
            Cache-Control:
              description: Prevents access and refresh tokens from being cached.
              schema:
                type: string
                example: no-store
            Pragma:
              description: Legacy cache prevention for token responses.
              schema:
                type: string
                example: no-cache
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponseDto'
        '400':
          description: Invalid or unexpected request field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '401':
          description: Invalid phone number or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '429':
          description: More than 5 login attempts in 15 minutes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      summary: Log in with phone number and password
      tags:
        - Auth
  /auth/send-otp:
    post:
      description: >-
        Requires `Content-Type: application/json`. Requests a six-digit OTP
        through SMS or WhatsApp. This endpoint does not require an access token
        and is limited to three requests per phone/channel in ten minutes.
      operationId: Auth_sendOtp
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendOtpDto'
            examples:
              sms:
                summary: Send by SMS
                value:
                  phone: '+212612345678'
                  channel: sms
              whatsapp:
                summary: Send by WhatsApp
                value:
                  phone: '+212612345678'
                  channel: whatsapp
      responses:
        '200':
          description: >-
            OTP request accepted. In development OTP mode no SMS is sent; use
            DEV_OTP_CODE.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseDto'
        '400':
          description: Invalid phone number, channel, or unexpected request field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '429':
          description: More than 3 OTP requests in 10 minutes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '503':
          description: OTP provider is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      summary: Send OTP to phone number
      tags:
        - Auth
  /auth/verify-otp:
    post:
      description: >-
        Creates the user on first successful verification. Returns a 15-minute
        access token and a 7-day refresh token.
      operationId: Auth_verifyOtp
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpDto'
            examples:
              default:
                summary: Verify a six-digit OTP
                value:
                  phone: '+212612345678'
                  otp: '123456'
      responses:
        '200':
          description: Returns access token, refresh token, and profile status
          headers:
            Cache-Control:
              description: Prevents access and refresh tokens from being cached.
              schema:
                type: string
                example: no-store
            Pragma:
              description: Legacy cache prevention for token responses.
              schema:
                type: string
                example: no-cache
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponseDto'
        '400':
          description: Invalid input or invalid/expired OTP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '429':
          description: More than 5 verification attempts in 10 minutes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      summary: Verify OTP and log in or register
      tags:
        - Auth
  /auth/refresh:
    post:
      description: >-
        The supplied refresh token is single-use after rotation. Store the newly
        returned refresh token.
      operationId: Auth_refreshTokens
      parameters: []
      requestBody:
        required: true
        description: >-
          Send the refresh token in the JSON body, not in the Authorization
          header.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenDto'
            examples:
              default:
                summary: Rotate the refresh token
                value:
                  refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: New access and refresh tokens.
          headers:
            Cache-Control:
              description: Prevents access and refresh tokens from being cached.
              schema:
                type: string
                example: no-store
            Pragma:
              description: Legacy cache prevention for token responses.
              schema:
                type: string
                example: no-cache
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairDto'
        '400':
          description: Missing, empty, or unexpected request field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '401':
          description: Refresh token is invalid, expired, revoked, or not a refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      summary: Rotate refresh token and issue a new token pair
      tags:
        - Auth
  /users/me:
    get:
      description: >-
        Returns the user identified by the bearer access token, including the
        store when one exists. Refresh-token hashes are never returned.
      operationId: Users_getProfile
      parameters: []
      responses:
        '200':
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDto'
        '401':
          description: Missing, invalid, expired, or non-access bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '404':
          description: User no longer exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Get current user profile
      tags:
        - Users
  /stores:
    post:
      description: >-
        Creates one store for the authenticated user and marks onboarding as
        complete.
      operationId: Stores_create
      parameters: []
      requestBody:
        required: true
        description: Store profile and pickup address for the current user.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoreDto'
            examples:
              moroccoStore:
                summary: Moroccan online store
                value:
                  ownerName: Ahmed Alaoui
                  businessName: Atlas Market
                  address: 123 Rue Hassan II
                  city: Casablanca
                  country: Morocco
                  logoUrl: https://example.com/logo.png
      responses:
        '201':
          description: Store created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreResponseDto'
        '400':
          description: Invalid, missing, or unexpected request field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '409':
          description: The authenticated user already has a store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Create the current user’s store
      tags:
        - Stores
  /stores/me:
    get:
      description: >-
        Requires `Authorization: Bearer <accessToken>`. Returns the single store
        owned by the authenticated user.
      operationId: Stores_findOne
      parameters: []
      responses:
        '200':
          description: Current user’s store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreResponseDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '404':
          description: The authenticated user has not created a store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Get the current user’s store
      tags:
        - Stores
    put:
      description: All request fields are optional; only supplied fields are changed.
      operationId: Stores_update
      parameters: []
      requestBody:
        required: true
        description: >-
          Partial update. Include at least one field; omitted fields remain
          unchanged.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStoreDto'
            examples:
              renameStore:
                summary: Update business name and logo
                value:
                  businessName: Atlas Market Pro
                  logoUrl: https://example.com/new-logo.png
              updateAddress:
                summary: Update pickup address
                value:
                  address: 45 Boulevard Zerktouni
                  city: Casablanca
                  country: Morocco
      responses:
        '200':
          description: Updated store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreResponseDto'
        '400':
          description: Invalid or unexpected request field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '404':
          description: The authenticated user has not created a store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Update the current user’s store
      tags:
        - Stores
  /shipping/sendit/connection:
    get:
      description: >-
        **Authorization header:** `Bearer <accessToken>`. Use the Zomaal access
        token returned by `/auth/login` or `/auth/verify-otp`; a refresh token
        is not accepted. In Swagger UI, click **Authorize** and paste the access
        token only.


        Returns whether the authenticated Zomaal user has encrypted Sendit
        credentials stored. This status check reads Zomaal's database and does
        not call Sendit. A disconnected account is a successful `200` response
        with `connected: false`.
      operationId: getSenditConnectionStatus
      parameters: []
      responses:
        '200':
          description: Current user Sendit connection status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditConnectionStatusDto'
              examples:
                connected:
                  summary: Sendit account connected
                  value:
                    connected: true
                    provider: sendit.ma
                    accountName: Zomaal Store
                    connectedAt: '2026-07-17T09:15:00.000Z'
                    message: Sendit account is connected
                disconnected:
                  summary: No Sendit account connected
                  value:
                    connected: false
                    provider: sendit.ma
                    accountName: null
                    connectedAt: null
                    message: Sendit account is not connected
        '401':
          description: >-
            Authentication failed. Every route requires a valid Zomaal access
            token; provider-backed routes can also return 401 when Sendit
            rejects the stored credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditConnectionErrorDto'
              examples:
                missingOrInvalidAccessToken:
                  summary: Missing, expired, or invalid Zomaal access token
                  value:
                    message: Unauthorized
                    error: Unauthorized
                    statusCode: 401
                senditCredentialsRejected:
                  summary: Stored Sendit credentials were rejected
                  value:
                    message: Sendit request was not authorized
                    error: Unauthorized
                    statusCode: 401
      security:
        - bearer: []
      summary: Check Sendit account connection
      tags:
        - Shipping - Sendit
    post:
      description: >-
        **Authorization header:** `Bearer <accessToken>`. Use the Zomaal access
        token returned by `/auth/login` or `/auth/verify-otp`; a refresh token
        is not accepted. In Swagger UI, click **Authorize** and paste the access
        token only.


        **Content-Type header:** `application/json`. Validates the supplied
        public and secret API keys against Sendit, then encrypts and stores them
        for the authenticated Zomaal user. Calling this route again atomically
        replaces the previous credentials. Neither key is returned.
      operationId: connectSenditAccount
      parameters: []
      requestBody:
        required: true
        description: >-
          Sendit API credentials generated from the merchant dashboard. Both
          fields are required; unknown fields are rejected.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectSenditDto'
      responses:
        '201':
          description: Sendit credentials verified and account connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditConnectionStatusDto'
              example:
                connected: true
                provider: sendit.ma
                accountName: Zomaal Store
                connectedAt: '2026-07-17T09:15:00.000Z'
                message: Sendit account is connected
        '400':
          description: >-
            The JSON body is missing, contains empty credentials, uses the wrong
            types, or includes unexpected fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditValidationErrorDto'
              example:
                message:
                  - public_key should not be empty
                error: Bad Request
                statusCode: 400
        '401':
          description: >-
            Authentication failed. Every route requires a valid Zomaal access
            token; provider-backed routes can also return 401 when Sendit
            rejects the stored credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditConnectionErrorDto'
              examples:
                missingOrInvalidAccessToken:
                  summary: Missing, expired, or invalid Zomaal access token
                  value:
                    message: Unauthorized
                    error: Unauthorized
                    statusCode: 401
                senditCredentialsRejected:
                  summary: Stored Sendit credentials were rejected
                  value:
                    message: Sendit request was not authorized
                    error: Unauthorized
                    statusCode: 401
        '502':
          description: Sendit is reachable but returned an invalid or failed response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditUpstreamErrorDto'
        '503':
          description: >-
            The SHIPPING_CREDENTIAL_ENCRYPTION_KEY deployment secret is missing
            or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditServiceUnavailableErrorDto'
      security:
        - bearer: []
      summary: Connect or replace the current user's Sendit account
      tags:
        - Shipping - Sendit
    delete:
      description: >-
        **Authorization header:** `Bearer <accessToken>`. Use the Zomaal access
        token returned by `/auth/login` or `/auth/verify-otp`; a refresh token
        is not accepted. In Swagger UI, click **Authorize** and paste the access
        token only.


        Deletes the authenticated user's encrypted Sendit credentials and cached
        provider access token. This operation is idempotent: it returns the same
        disconnected state when no connection exists.
      operationId: disconnectSenditAccount
      parameters: []
      responses:
        '200':
          description: >-
            Sendit account disconnected; also succeeds when it was already
            disconnected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditConnectionStatusDto'
              example:
                connected: false
                provider: sendit.ma
                accountName: null
                connectedAt: null
                message: Sendit account disconnected
        '401':
          description: >-
            Authentication failed. Every route requires a valid Zomaal access
            token; provider-backed routes can also return 401 when Sendit
            rejects the stored credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditConnectionErrorDto'
              examples:
                missingOrInvalidAccessToken:
                  summary: Missing, expired, or invalid Zomaal access token
                  value:
                    message: Unauthorized
                    error: Unauthorized
                    statusCode: 401
                senditCredentialsRejected:
                  summary: Stored Sendit credentials were rejected
                  value:
                    message: Sendit request was not authorized
                    error: Unauthorized
                    statusCode: 401
      security:
        - bearer: []
      summary: Disconnect the current user's Sendit account
      tags:
        - Shipping - Sendit
  /shipping/sendit/deliveries:
    get:
      description: >-
        **Authorization header:** `Bearer <accessToken>`. Use the Zomaal access
        token returned by `/auth/login` or `/auth/verify-otp`; a refresh token
        is not accepted. In Swagger UI, click **Authorize** and paste the access
        token only.


        Returns a provider-backed, paginated delivery list. Use `querystring`
        for Sendit's free-text search. The response is forwarded from Sendit and
        can contain additional provider fields.
      operationId: listSenditDeliveries
      parameters:
        - name: page
          required: false
          in: query
          description: One-based result page. Defaults to the provider default.
          schema:
            type: integer
            minimum: 1
            example: 1
        - name: querystring
          required: false
          in: query
          description: >-
            Provider search text, such as a code, name, phone number, or
            merchant reference.
          schema:
            type: string
            example: ORDER-2026-0042
      responses:
        '200':
          description: >-
            Sendit delivery collection. Provider-owned resource fields may be
            added over time.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditDeliveryListResponseDto'
        '400':
          description: >-
            page must be an integer greater than or equal to 1, and querystring
            must be text.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditValidationErrorDto'
        '401':
          description: >-
            Authentication failed. Every route requires a valid Zomaal access
            token; provider-backed routes can also return 401 when Sendit
            rejects the stored credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditConnectionErrorDto'
              examples:
                missingOrInvalidAccessToken:
                  summary: Missing, expired, or invalid Zomaal access token
                  value:
                    message: Unauthorized
                    error: Unauthorized
                    statusCode: 401
                senditCredentialsRejected:
                  summary: Stored Sendit credentials were rejected
                  value:
                    message: Sendit request was not authorized
                    error: Unauthorized
                    statusCode: 401
        '409':
          description: The authenticated user has not connected a Sendit account yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditNotConnectedErrorDto'
        '502':
          description: >-
            Sendit returned a non-success response, malformed JSON, or an
            incomplete payload. Provider details are included when available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditUpstreamErrorDto'
        '503':
          description: >-
            Stored Sendit credentials cannot be decrypted or credential
            encryption is misconfigured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditServiceUnavailableErrorDto'
      security:
        - bearer: []
      summary: List Sendit deliveries
      tags:
        - Shipping - Sendit
    post:
      description: >-
        **Authorization header:** `Bearer <accessToken>`. Use the Zomaal access
        token returned by `/auth/login` or `/auth/verify-otp`; a refresh token
        is not accepted. In Swagger UI, click **Authorize** and paste the access
        token only.


        **Content-Type header:** `application/json`. Creates a cash-on-delivery
        shipment in Sendit. District IDs must come from the district endpoints.
        The resulting Sendit tracking code is returned in the provider response.
      operationId: createSenditDelivery
      parameters: []
      requestBody:
        required: true
        description: >-
          Complete recipient, route, amount, and parcel-option details. Unknown
          fields are rejected.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SenditDeliveryDto'
      responses:
        '201':
          description: Delivery created by Sendit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditDeliveryResponseDto'
        '400':
          description: >-
            The delivery body is missing required fields, contains wrong data
            types, uses option flags outside 0/1, or includes unexpected fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditValidationErrorDto'
        '401':
          description: >-
            Authentication failed. Every route requires a valid Zomaal access
            token; provider-backed routes can also return 401 when Sendit
            rejects the stored credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditConnectionErrorDto'
              examples:
                missingOrInvalidAccessToken:
                  summary: Missing, expired, or invalid Zomaal access token
                  value:
                    message: Unauthorized
                    error: Unauthorized
                    statusCode: 401
                senditCredentialsRejected:
                  summary: Stored Sendit credentials were rejected
                  value:
                    message: Sendit request was not authorized
                    error: Unauthorized
                    statusCode: 401
        '409':
          description: The authenticated user has not connected a Sendit account yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditNotConnectedErrorDto'
        '502':
          description: >-
            Sendit returned a non-success response, malformed JSON, or an
            incomplete payload. Provider details are included when available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditUpstreamErrorDto'
        '503':
          description: >-
            Stored Sendit credentials cannot be decrypted or credential
            encryption is misconfigured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditServiceUnavailableErrorDto'
      security:
        - bearer: []
      summary: Create a Sendit delivery
      tags:
        - Shipping - Sendit
  /shipping/sendit/deliveries/statuses:
    get:
      description: >-
        **Authorization header:** `Bearer <accessToken>`. Use the Zomaal access
        token returned by `/auth/login` or `/auth/verify-otp`; a refresh token
        is not accepted. In Swagger UI, click **Authorize** and paste the access
        token only.


        Returns Sendit's current delivery-status catalog for displaying and
        interpreting shipment state.
      operationId: listSenditDeliveryStatuses
      parameters: []
      responses:
        '200':
          description: Current delivery statuses defined by Sendit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditDeliveryStatusListResponseDto'
        '401':
          description: >-
            Authentication failed. Every route requires a valid Zomaal access
            token; provider-backed routes can also return 401 when Sendit
            rejects the stored credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditConnectionErrorDto'
              examples:
                missingOrInvalidAccessToken:
                  summary: Missing, expired, or invalid Zomaal access token
                  value:
                    message: Unauthorized
                    error: Unauthorized
                    statusCode: 401
                senditCredentialsRejected:
                  summary: Stored Sendit credentials were rejected
                  value:
                    message: Sendit request was not authorized
                    error: Unauthorized
                    statusCode: 401
        '409':
          description: The authenticated user has not connected a Sendit account yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditNotConnectedErrorDto'
        '502':
          description: >-
            Sendit returned a non-success response, malformed JSON, or an
            incomplete payload. Provider details are included when available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditUpstreamErrorDto'
        '503':
          description: >-
            Stored Sendit credentials cannot be decrypted or credential
            encryption is misconfigured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditServiceUnavailableErrorDto'
      security:
        - bearer: []
      summary: List Sendit delivery statuses
      tags:
        - Shipping - Sendit
  /shipping/sendit/deliveries/labels:
    post:
      description: >-
        **Authorization header:** `Bearer <accessToken>`. Use the Zomaal access
        token returned by `/auth/login` or `/auth/verify-otp`; a refresh token
        is not accepted. In Swagger UI, click **Authorize** and paste the access
        token only.


        **Content-Type header:** `application/json`. Generates an A4 or 10x10 cm
        thermal label batch for one or more comma-separated Sendit delivery
        codes.
      operationId: generateSenditDeliveryLabels
      parameters: []
      requestBody:
        required: true
        description: Delivery codes and the requested print layout.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SenditLabelsDto'
      responses:
        '201':
          description: >-
            Labels generated. Sendit controls whether label data is returned as
            a URL, encoded content, or metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditLabelsResponseDto'
        '400':
          description: >-
            codesToPrint must be a comma-separated string and printFormat must
            be numeric 0 (A4) or 1 (thermal).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenditValidationErrorDto'
        '401':
          description: >-
            Authentication failed. Every route requires a valid Zomaal access
            token; provider-backed routes can also return 401 when Sendit
            rejects the stored credentials.
          content:
            application/json:
