          example: Casablanca
          maxLength: 50
        ADDRESS:
          type: string
          description: Complete street address for delivery.
          example: 12 Rue Al Massira, Maarif
          maxLength: 100
        HOW:
          type: string
          description: Delivery directions or recipient availability details.
          example: Call before delivery; apartment 4
          maxLength: 100
        PRODUCT_NATURE:
          type: string
          description: Plain-language description of the parcel contents.
          example: Two cotton shirts
          maxLength: 100
        COD:
          type: number
          description: >-
            Cash-on-delivery amount in Moroccan dirhams. Omit or use `0` for a
            prepaid parcel.
          example: 349
          minimum: 0
        CAN_OPEN:
          type: boolean
          description: >-
            Whether the recipient may open and inspect the parcel before
            accepting it.
          example: false
          default: false
        STOCK:
          type: string
          description: >-
            Comma-separated ForceLog stock references. Add `:quantity` when the
