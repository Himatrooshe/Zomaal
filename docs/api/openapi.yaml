      requestBody:
        required: true
        description: >-
          Provider-defined event payload. Fields can vary according to event
          type.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                event: delivery.updated
                code: DH123456
                status: delivered
      responses:
        '200':
          description: Webhook accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookReceiptDto'
        '400':
          description: Malformed JSON payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      summary: Receive a Sendit webhook event
      tags:
        - Provider Webhooks
  /shipping/quicklivraison/connection:
    get:
      description: >-
        Requires `Authorization: Bearer <accessToken>`. Returns whether the
        authenticated Zomaal user has a stored QuickLivraison API key. This
        status check does not call QuickLivraison and never returns the stored
        key.
      operationId: getQuickLivraisonConnectionStatus
      parameters: []
      responses:
        '200':
          description: Current user QuickLivraison connection status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickLivraisonConnectionStatusDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Check QuickLivraison account connection
      tags:
        - Shipping - QuickLivraison
    post:
      description: >-
        Requires `Authorization: Bearer <accessToken>` and `Content-Type:
        application/json`. Validates a primary or subuser API key with
        QuickLivraison, then encrypts and stores it for the authenticated Zomaal
        user. Reconnecting replaces the previous credential. The API key is
        never returned.
      operationId: connectQuickLivraisonAccount
      parameters: []
      requestBody:
        required: true
        description: >-
          QuickLivraison credential to validate and store for the authenticated
          user.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectQuickLivraisonDto'
            examples:
              subuser:
                summary: Subuser API key
                value:
                  apiKey: sub_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
              primary:
                summary: Primary account API key
                value:
                  apiKey: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      responses:
        '201':
          description: API key verified and QuickLivraison account connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickLivraisonConnectionStatusDto'
        '400':
          description: Missing, empty, or unexpected request fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '502':
          description: QuickLivraison rejected the API key or returned an invalid response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickLivraisonConnectionErrorDto'
        '503':
          description: >-
            QuickLivraison is unreachable or credential encryption is
            unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Connect or replace the current user's QuickLivraison account
      tags:
        - Shipping - QuickLivraison
    delete:
      description: >-
        Requires `Authorization: Bearer <accessToken>`. Deletes the encrypted
        API key stored for the authenticated Zomaal user. This operation is
        idempotent: disconnecting an already disconnected account still
        succeeds.
      operationId: disconnectQuickLivraisonAccount
      parameters: []
      responses:
        '200':
          description: QuickLivraison account disconnected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickLivraisonConnectionStatusDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Disconnect the current user's QuickLivraison account
      tags:
        - Shipping - QuickLivraison
  /shipping/quicklivraison/deliveries:
    post:
      description: >-
        Requires `Authorization: Bearer <accessToken>` and `Content-Type:
        application/json`. The authenticated user must connect QuickLivraison
        first. Zomaal injects the stored provider API key server-side; never
        include `api_key` in this payload. The successful body is passed through
        from QuickLivraison.
      operationId: createQuickLivraisonDelivery
      parameters: []
      requestBody:
        required: true
        description: >-
          Recipient, cash-on-delivery, fulfillment, and optional exchange
          details.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuickLivraisonDeliveryDto'
            examples:
              nonStock:
                summary: Non-stock cash-on-delivery parcel
                value:
                  district_id: 123
                  name: Sara El Amrani
                  amount: 250
                  phone: '0612345678'
                  address: 123 Rue Al Massira, Maarif, Casablanca
                  code: ORDER-1001
                  note: Call the recipient before delivery
                  open: false
                  try: false
                  echange: false
                  prd_name: Running shoes
                  qte_prd: 1
              stock:
                summary: Stock-fulfilled parcel
                value:
                  district_id: 123
                  name: Sara El Amrani
                  amount: 250
                  phone: '0612345678'
                  address: 123 Rue Al Massira, Maarif, Casablanca
                  code: ORDER-1001
                  received_quantity:
                    '42': 2
              exchange:
                summary: Exchange parcel
                value:
                  district_id: 123
                  name: Sara El Amrani
                  amount: 0
                  phone: '0612345678'
                  address: 123 Rue Al Massira, Maarif, Casablanca
                  code: EXCHANGE-1001
                  echange: true
                  echange_colis: PARCEL_87654321
                  prd_name: Replacement running shoes
                  qte_prd: 1
      responses:
        '201':
          description: >-
            Delivery accepted. Zomaal returns the QuickLivraison JSON response
            unchanged, so the provider may add fields to this envelope.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                example:
                  success: Colis ajouté avec succès.
                  tracking_number: PARCEL_12345678
        '400':
          description: >-
            A required delivery field is missing/invalid or an unexpected field
            was sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '409':
          description: The current user has not connected a QuickLivraison account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '502':
          description: >-
            QuickLivraison rejected the request or returned a malformed/failed
            response. When available, the raw provider error is included in
            `quicklivraison`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickLivraisonConnectionErrorDto'
        '503':
          description: >-
            QuickLivraison is unreachable or the stored credential cannot be
            decrypted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Create a QuickLivraison delivery
      tags:
        - Shipping - QuickLivraison
    get:
      description: >-
        Requires `Authorization: Bearer <accessToken>`. Returns the delivery
        collection from the connected QuickLivraison account. The provider
        currently controls pagination and the pass-through response envelope.
      operationId: listQuickLivraisonDeliveries
      parameters: []
      responses:
        '200':
          description: >-
            QuickLivraison delivery list returned unchanged. The response may be
            either an array or a provider envelope containing the array.
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      type: object
                      additionalProperties: true
                  - type: object
                    additionalProperties: true
                example:
                  - tracking_number: PARCEL_12345678
                    code: ORDER-1001
                    name: Sara El Amrani
                    phone: '0612345678'
                    amount: 250
                    status: En cours
                    created_at: '2026-07-17T09:00:00.000Z'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
