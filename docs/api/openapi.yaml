    OzoneExpressParcelRequest:
      type: object
      required: [receiver, phone, city, address, price, stock]
      properties:
        trackingNumber:
          type: string
          description: Optional personalized tracking number.
        receiver:
          type: string
          example: Mohammed Alami
        phone:
          type: string
          example: '0612345678'
        city:
          type: string
          description: OzoneExpress city ID.
          example: '1'
        address:
          type: string
          example: 123 Rue Hassan II
        price:
          type: number
          example: 250
        stock:
          type: integer
          enum: [0, 1]
