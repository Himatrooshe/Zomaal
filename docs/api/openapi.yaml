  /shipping/quicklivraison/webhook:
    post:
      description: >-
        Public callback endpoint for QuickLivraison. When
        QUICKLIVRAISON_WEBHOOK_SECRET is configured, the signature is verified
        against the exact raw request body.
      operationId: QuickLivraisonWebhook_receiveWebhook
      parameters:
        - name: x-webhook-signature
          in: header
          description: >-
            HMAC-SHA256 signature formatted as sha256=<hex>. Required when
            QUICKLIVRAISON_WEBHOOK_SECRET is configured.
          required: false
          schema:
            type: string
            example: sha256=75f0b6f1c3d7...
      requestBody:
        required: true
        description: >-
          Provider-defined event payload. Fields can vary according to event
          type.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                event: parcel.updated
                trackingNumber: PARCEL_12345678
                status: delivered
      responses:
        '200':
          description: Webhook signature verified (when enabled) and event accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookReceiptDto'
        '400':
          description: Malformed JSON payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '401':
          description: Webhook signature is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      summary: Receive a QuickLivraison webhook event
      tags:
        - Provider Webhooks
  /shipping/forcelog/connection:
    get:
      description: >-
        Requires `Authorization: Bearer <accessToken>`. In Swagger UI, click
        **Authorize** and paste the Zomaal access token only. Returns whether
        the current user has an encrypted ForceLog API key stored. The key is
        never returned and this check does not call ForceLog.
      operationId: getForceLogConnectionStatus
      parameters: []
      responses:
        '200':
          description: Current user ForceLog connection status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForceLogConnectionStatusDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Check ForceLog account connection
      tags:
        - Shipping - ForceLog
    post:
      description: >-
        Requires `Authorization: Bearer <accessToken>`. In Swagger UI, click
        **Authorize** and paste the Zomaal access token only. Requires
        `Content-Type: application/json`. Validates the key with ForceLog, then
        encrypts and stores it. Reconnecting replaces the previous key; the
        plaintext key is never returned.
      operationId: connectForceLogAccount
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectForceLogDto'
            examples:
              apiKey:
                summary: ForceLog customer API key
                value:
                  apiKey: your-forcelog-api-key
      responses:
        '201':
          description: API key verified and ForceLog account connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForceLogConnectionStatusDto'
        '400':
          description: Missing, empty, or unexpected request field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '502':
          description: ForceLog rejected the API key or returned an invalid response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
        '503':
          description: ForceLog is unreachable or credential encryption is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Connect or replace the current user's ForceLog account
      tags:
        - Shipping - ForceLog
    delete:
      description: >-
        Requires `Authorization: Bearer <accessToken>`. In Swagger UI, click
        **Authorize** and paste the Zomaal access token only. Deletes the
        encrypted API key. The operation is idempotent and does not delete
        anything in ForceLog.
      operationId: disconnectForceLogAccount
      parameters: []
      responses:
        '200':
          description: ForceLog account disconnected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForceLogConnectionStatusDto'
        '401':
          description: Missing or invalid Zomaal bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDto'
      security:
        - bearer: []
      summary: Disconnect the current user's ForceLog account
      tags:
        - Shipping - ForceLog
