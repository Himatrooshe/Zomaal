          example: TSHIRT-BLK-M:2,JEANS-BLU-32
        FRAGILE:
          type: boolean
          description: Whether ForceLog should handle the parcel as fragile.
          example: true
          default: false
        CARTON:
          type: string
          description: Carton/package reference understood by ForceLog.
          example: CARTON-M
