    WebhookReceiptDto:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: QuickLivraison webhook received
      required:
        - success
        - message
    QuickLivraisonConnectionStatusDto:
      type: object
      properties:
        connected:
          type: boolean
          description: >-
            Whether the authenticated Zomaal user currently has stored
            QuickLivraison credentials.
          example: true
        provider:
          type: string
          description: Stable provider identifier.
          enum:
            - quicklivraison.ma
          example: quicklivraison.ma
        keyType:
          type: string
          description: >-
            Detected credential type. Null when no QuickLivraison account is
            connected.
          enum:
            - primary
            - subuser
          example: subuser
          nullable: true
        connectedAt:
          type: string
          description: >-
            UTC time at which the current credential was connected or replaced.
            Null while disconnected.
          example: '2026-07-15T10:30:00.000Z'
          nullable: true
          format: date-time
        message:
          type: string
          description: Human-readable status summary.
          example: QuickLivraison account is connected
      required:
        - connected
        - provider
        - keyType
        - connectedAt
        - message
    ConnectQuickLivraisonDto:
      type: object
      properties:
        apiKey:
          type: string
          description: >-
            Primary or subuser API key generated in the QuickLivraison customer
            dashboard. Zomaal validates it with QuickLivraison, encrypts it at
            rest, and never returns it.
          example: sub_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          format: password
          writeOnly: true
      required:
        - apiKey
    QuickLivraisonConnectionErrorDto:
      type: object
      properties:
        message:
          oneOf:
            - type: string
              example: QuickLivraison request failed with status 401
            - type: array
              items:
                type: string
              example:
                - apiKey should not be empty
        error:
          type: string
          description: >-
            Standard NestJS error label. Omitted when the raw provider error
            object is attached.
          example: Bad Gateway
        statusCode:
          type: number
          description: >-
            HTTP status code. Omitted when the raw provider error object is
            attached.
          example: 502
        quicklivraison:
          type: object
          description: >-
            Provider error body when QuickLivraison returned structured JSON.
            This field is omitted when the response could not be parsed.
          additionalProperties: true
          example:
            error_code: 401
            error: The supplied API key is not valid
      required:
        - message
    QuickLivraisonDeliveryDto:
      type: object
      properties:
        district_id:
          type: number
          description: >-
            QuickLivraison destination city/district identifier. Resolve the
            identifier with GET /shipping/quicklivraison/cities before creating
            the delivery.
          example: 123
        name:
          type: string
          description: Full name of the person receiving the parcel.
          example: Sara El Amrani
        amount:
          type: number
          description: >-
            Cash-on-delivery amount in Moroccan dirhams (MAD). Use 0 for a
            prepaid parcel.
          example: 250
          minimum: 0
        phone:
          type: string
          description: >-
            Recipient phone number as accepted by QuickLivraison. A Moroccan
            national-format number is shown in the example.
          example: '0612345678'
        address:
          type: string
          description: Complete street address used by the courier for the final delivery.
          example: 123 Rue Al Massira, Maarif, Casablanca
        code:
          type: string
          description: >-
            Merchant-defined parcel or order reference used to reconcile the
            provider parcel with your order.
          example: ORDER-1001
        note:
          type: string
          description: Instructions forwarded to the delivery operation.
          example: Call the recipient before delivery
        open:
          type: boolean
          description: Allow the recipient to open the parcel before accepting it.
          default: false
          example: false
        try:
          type: boolean
          description: Allow the recipient to try the product before accepting the parcel.
          default: false
          example: false
        echange:
          type: boolean
          description: >-
            Marks the delivery as an exchange. When true, provide echange_colis
            with the original parcel tracking number.
          default: false
          example: false
        echange_colis:
          type: string
          description: >-
            QuickLivraison tracking number of the original parcel being
            exchanged. Used when echange is true.
          example: PARCEL_87654321
        vendeur_name:
          type: string
          description: Seller/contact name shown for the parcel.
          example: Zomaal Store
        vendeur_phone:
          type: string
          description: Seller/contact phone number shown for the parcel.
          example: '0600000000'
        store_name:
          type: string
          description: Store name associated with the parcel.
          example: Zomaal Store
        prd_name:
          type: string
          description: >-
            Human-readable product name for non-stock deliveries. For stock
            fulfillment, use received_quantity instead.
          example: Running shoes
        qte_prd:
          type: number
          description: Product quantity for a non-stock delivery. Pair it with prd_name.
          example: 1
          minimum: 1
        received_quantity:
          type: object
          description: >-
            Stock-fulfillment quantities keyed by QuickLivraison product ID.
            Resolve product IDs with GET /shipping/quicklivraison/products. Do
            not send this field for a non-stock delivery.
          example:
            '42': 2
          additionalProperties:
            type: integer
            minimum: 1
      required:
        - district_id
        - name
        - amount
        - phone
        - address
    QuickLivraisonBulkDeliveryDto:
      type: object
      properties:
        parcels:
          description: >-
            Deliveries to submit in one provider request. Every item follows the
            same rules as a single QuickLivraison delivery.
          minItems: 1
          example:
            - district_id: 123
              name: Sara El Amrani
              amount: 250
              phone: '0612345678'
              address: 123 Rue Al Massira, Maarif, Casablanca
              code: ORDER-1001
              note: Call the recipient before delivery
              open: false
              try: false
              echange: false
              prd_name: Running shoes
              qte_prd: 1
            - district_id: 456
              name: Youssef Alaoui
              amount: 399
              phone: '0623456789'
              address: 45 Avenue Mohammed V, Rabat
              code: ORDER-1002
              received_quantity:
                '42': 2
          type: array
          items:
            $ref: '#/components/schemas/QuickLivraisonDeliveryDto'
      required:
        - parcels
    ForceLogConnectionStatusDto:
      type: object
      properties:
